name: Refresh Battlegrounds Leaderboard

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node scripts/generate-leaderboard-snapshot.js
      - name: Commit snapshot
        run: |
          if git diff --quiet -- data/battlegrounds-leaderboard.json; then
            echo "No leaderboard changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/battlegrounds-leaderboard.json
          git commit -m "chore: refresh battlegrounds leaderboard snapshot"
          git push
